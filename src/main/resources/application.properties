# Server Configuration
server.port=${PORT:8080}
server.servlet.context-path=/

# MySQL DB
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3307/isysnap?serverTimezone=UTC&useLegacyDatetimeCode=false}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA/Hibernate
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# H2 Console (disabled in production)
spring.h2.console.enabled=false

# Logging
logging.level.root=INFO
logging.level.com.isysnap=${LOG_LEVEL_APP:INFO}
logging.level.org.springframework.web=WARN

# Jackson
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.time-zone=UTC

# Swagger/OpenAPI Configuration
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha
springdoc.swagger-ui.docExpansion=none

# JWT Configuration (Staff/Admin authentication)
# Set JWT_SECRET env var to a strong random secret (min 32 chars) in production
jwt.secret=${JWT_SECRET:isysnap-super-secret-key-change-in-production-min-32-chars-required-for-hs256}
jwt.expiration=${JWT_EXPIRATION:86400000}

# Guest Session JWT Configuration (Customer authentication via QR scan)
# Set GUEST_JWT_SECRET env var in production
guest.jwt.secret=${GUEST_JWT_SECRET:isysnap-guest-session-secret-change-in-production-min-32-chars-for-hs256}
guest.jwt.expiration=${GUEST_JWT_EXPIRATION:14400000}

# QR Code Secret (for QR signature validation)
# Set QR_SECRET_KEY env var in production
qr.secret.key=${QR_SECRET_KEY:isysnap-qr-secret-key-change-in-production-min-32-chars-required}
