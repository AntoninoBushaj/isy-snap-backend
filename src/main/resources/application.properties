# Server Configuration
server.port=8080
server.servlet.context-path=/

# MYSQL DB
# IMPORTANT: serverTimezone=UTC ensures all dates are stored/retrieved in UTC (no timezone conversion issues)
spring.datasource.url = jdbc:mysql://localhost:3307/isysnap?serverTimezone=UTC&useLegacyDatetimeCode=false
spring.datasource.username = root
spring.datasource.password = root

# H2 In-Memory Database (for development/testing)
#spring.datasource.url=jdbc:h2:mem:isysnap
#spring.datasource.driverClassName=org.h2.Driver
#spring.datasource.username=sa
#spring.datasource.password=

# JPA/Hibernate
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
# Force Hibernate to use UTC timezone for all date/time operations
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# H2 Console (optional, for debugging)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Logging
logging.level.root=INFO
logging.level.com.isysnap=DEBUG
logging.level.org.springframework.web=DEBUG

# Jackson
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.time-zone=UTC

# Swagger/OpenAPI Configuration
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha
springdoc.swagger-ui.docExpansion=none

# To switch to PostgreSQL, uncomment below and comment H2 config:
# spring.datasource.url=jdbc:postgresql://localhost:5432/isysnap
# spring.datasource.username=postgres
# spring.datasource.password=password
# spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
# spring.jpa.hibernate.ddl-auto=validate

# JWT Configuration (Staff/Admin authentication)
jwt.secret=isysnap-super-secret-key-change-in-production-min-32-chars-required-for-hs256
jwt.expiration=86400000

# Guest Session JWT Configuration (Customer authentication via QR scan)
guest.jwt.secret=isysnap-guest-session-secret-change-in-production-min-32-chars-for-hs256
guest.jwt.expiration=14400000

# QR Code Secret (for QR signature validation)
qr.secret.key=isysnap-qr-secret-key-change-in-production-min-32-chars-required