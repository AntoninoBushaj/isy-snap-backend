version: '3.8'

services:

  # Database MySQL per TableSnap Backend
  mysql-tablesnap:
    image: mysql:8.0.17
    container_name: tablesnap_mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: tablesnap
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - tablesnap-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

